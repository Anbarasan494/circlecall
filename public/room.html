<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CircleCall Meeting</title>

  <link rel="stylesheet" href="/style.css">

  <!-- Socket.IO -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- PeerJS -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>

  <!-- 🔥 NAME INPUT MODAL -->
  <div id="name-modal" class="modal">
    <div class="modal-box">
      <h2>Enter your name</h2>
      <input id="name-input" placeholder="Your name..." />
      <button onclick="enterRoom()">Join Meeting</button>
    </div>
  </div>

  <!-- 🔥 MAIN MEETING UI -->
  <div id="meeting-ui" style="display:none;">

    <!-- Video grid -->
    <div id="video-grid" class="video-grid"></div>

    <!-- Controls -->
    <div class="controls">
      <button onclick="toggleMute()">🎙️</button>
      <button onclick="toggleCamera()">📷</button>
      <button onclick="leave()">Leave</button>
    </div>

  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- ✅ IMPORTANT: load script LAST -->
  <script src="/script.js"></script>

</body>
</html>
