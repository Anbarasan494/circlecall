<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CircleCall — Free Video Meetings</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
</head>

<body class="home">

  <div class="home-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="home-card">
    <div class="logo">
      <div class="logo-mark">
        <span class="logo-ring"></span>
        <span class="logo-dot"></span>
      </div>
      <h1>CircleCall</h1>
    </div>

    <p class="tagline">
      Crystal-clear video meetings,<br><em>no fuss, no sign-up.</em>
    </p>

    <button class="btn-primary" onclick="createMeeting()">
      New Meeting
    </button>

    <div class="divider"><span>or join with a code</span></div>

    <div class="join-row">
      <input id="meetingId" placeholder="e.g. abc123" autocomplete="off" />
      <button class="btn-join" onclick="joinMeeting()">Join</button>
    </div>

    <p class="hint" id="hint"></p>
  </div>

  <script>
    function createMeeting() {
      const id = Math.random().toString(36).substring(2, 8)
      window.location.href = "/room/" + id
    }

    function joinMeeting() {
      const input = document.getElementById("meetingId")
      const id = input.value.trim()

      if (!id) {
        const hint = document.getElementById("hint")
        hint.textContent = "Please enter a meeting code."
        hint.classList.add("error")
        input.focus()
        return
      }

      window.location.href = "/room/" + id
    }

    // ✅ FIX: Run AFTER DOM loads
    document.addEventListener("DOMContentLoaded", () => {
      const input = document.getElementById("meetingId")
      const hint = document.getElementById("hint")

      input.addEventListener("keydown", e => {
        if (e.key === "Enter") joinMeeting()
      })

      input.addEventListener("input", () => {
        hint.textContent = ""
        hint.classList.remove("error")
      })
    })
  </script>

</body>
</html>
